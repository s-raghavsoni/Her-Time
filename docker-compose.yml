services:
  postgres:
    image: postgres:16-alpine
    container_name: her-time-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: her_time
    volumes:
      - her_time_pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d her_time']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  her_time_pgdata:
